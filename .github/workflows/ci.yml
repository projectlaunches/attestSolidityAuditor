name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Use Node.js 22
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Install Foundry 1.7.1
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1

      - name: Cache Solidity 0.8.20 for offline integration tests
        run: forge build samples/SmokeCounter.sol --use 0.8.20 --force

      - name: Run syntax and regression checks
        run: npm run check

      - name: Audit high-severity dependencies
        run: npm audit --audit-level=high
